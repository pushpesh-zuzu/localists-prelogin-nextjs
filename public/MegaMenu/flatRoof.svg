<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
  <!-- Building walls -->
  <rect x="2" y="9" width="16" height="9" stroke="#253238" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Flat roof / parapet -->
  <rect x="1" y="6" width="18" height="3" stroke="#253238" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- HVAC unit on roof - flat roof ki pehchaan -->
  <rect x="7" y="3" width="6" height="3" rx="1" stroke="#00AEEF" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="8" y="13" width="4" height="5" stroke="#253238" stroke-width="1.5"/>
  <!-- Window -->
  <rect x="3" y="11" width="3" height="3" stroke="#253238" stroke-width="1.5"/>
  <rect x="14" y="11" width="3" height="3" stroke="#253238" stroke-width="1.5"/>
</svg>